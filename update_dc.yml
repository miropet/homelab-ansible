---
- name: Raport Stilizat Windows Updates
  hosts: domain_controllers
  gather_facts: yes
  tasks:
    - name: Verificare Update-uri Disponibile
      ansible.windows.win_updates:
        state: searched
      register: update_results

    - name: Pregatire Date Server
      set_fact:
        server_info:
          name: "{{ inventory_hostname }}"
          count: "{{ update_results.found_update_count | default(0) }}"
          kb_list: "{% for key, val in (update_results.updates | default({})).items() %}{{ val.title[:40] }}{% if not loop.last %}, {% endif %}{% endfor %}"

- name: Generare Raport Final pe Mac Mini
  hosts: localhost
  tasks:
    - name: Scriere Tabel HTML
      copy:
        dest: "/tmp/windows_updates_report.txt"
        content: |
          <div style="font-family: Arial, sans-serif; max-width: 600px; border: 1px solid #e1e4e8; border-radius: 10px; overflow: hidden;">
            <div style="background-color: #004085; color: #ffffff; padding: 20px; text-align: center;">
              <h2 style="margin: 0; font-size: 20px;">🛡️ Hommikust Infrastructure</h2>
              <p style="margin: 5px 0 0 0; font-size: 14px; color: #a0c4ff;">Status Securitate Windows Updates</p>
            </div>
            <div style="padding: 20px; background-color: #ffffff;">
              {% for host in groups['domain_controllers'] %}
              {% set info = hostvars[host].server_info %}
              <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f0f2f5;">
                <div>
                  <strong style="font-size: 16px; color: #24292e;">{{ info.name }}</strong><br>
                  <span style="font-size: 12px; color: #586069;">Verificat la: {{ now().strftime('%d.%m.%Y %H:%M') }}</span>
                </div>
                <div style="text-align: right;">
                  {% if info.count|int == 0 %}
                    <span style="background-color: #28a745; color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;">PROTEJAT</span>
                  {% else %}
                    <span style="background-color: #d73a49; color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;">{{ info.count }} CRITICE</span>
                  {% endif %}
                </div>
              </div>
              {% endfor %}
            </div>
            <div style="background-color: #f6f8fa; padding: 15px; text-align: center; font-size: 12px; color: #6a737d;">
              Generat automat de Mac Mini M4 via n8n
            </div>
          </div>
