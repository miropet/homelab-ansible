---
- name: Update Windows Servers
  hosts: all
  tasks:
    - name: Install Security and Critical Updates
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
        state: installed
        reboot: yes
        reboot_timeout: 3600
      register: update_results

    - name: Genereaza raportul de status
      debug:
        msg: "Server: {{ inventory_hostname }} | Restartat: {{ update_results.reboot_required }} | Update-uri: {{ update_results.updates | map(attribute='title') | join(', ') | default('Era deja la zi, zero update-uri', true) }}"
