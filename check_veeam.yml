---
- name: Raport Status Backup si Replicare Veeam
  hosts: 10.2.1.21
  tasks:
    - name: Rulare comanda interogare Veeam
      ansible.windows.win_shell: >
        Import-Module Veeam.Backup.PowerShell -WarningAction SilentlyContinue ;
        $jobs = Get-VBRJob ;
        $rezultate = foreach ($job in $jobs) {
            $lastSession = $job.FindLastSession() ;
            if ($lastSession) {
                "Job: $($job.Name) | Status: $($lastSession.Result) | Finalizat: $($lastSession.EndTime.ToString('dd.MM.yyyy HH:mm'))"
            } else {
                "Job: $($job.Name) | Status: Nicio sesiune gasita vreodata"
            }
        } ;
        if (-not $rezultate) { Write-Output "Nu s-au gasit job-uri configurate in Veeam." } else { $rezultate }
      register: veeam_raport

    - name: Salvare raport curat pe Mac Mini
      copy:
        content: "{{ veeam_raport.stdout_lines | join('<br>') }}"
        dest: "/tmp/veeam_raport.txt"
      delegate_to: localhost
