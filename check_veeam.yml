---
- name: Raport Status Backup si Replicare Veeam
  hosts: 10.2.1.21
  tasks:
    - name: Rulare comanda interogare Veeam
      ansible.windows.win_shell: >
        Import-Module Veeam.Backup.PowerShell -WarningAction SilentlyContinue ;
        $sesiuni = Get-VBRBackupSession | Where-Object { $_.CreationTime -ge (Get-Date).AddDays(-1) } ;
        if (-not $sesiuni) { Write-Output "Nu a rulat niciun job Veeam in ultimele 24 de ore." }
        else { $sesiuni | ForEach-Object { "Job: $($_.JobName) | Tip: $($_.JobTypeString) | Status: $($_.Result) | Finalizat: $($_.EndTime.ToString('HH:mm'))" } }
      register: veeam_raport

    - name: Salvare raport curat pe Mac Mini
      copy:
        content: "{{ veeam_raport.stdout_lines | join('<br>') }}"
        dest: "/tmp/veeam_raport.txt"
      delegate_to: localhost
