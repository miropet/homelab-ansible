---
- name: Raport Veeam
  hosts: 10.2.1.21
  gather_facts: no
  tasks:
    - name: Executie PowerShell 7
      ansible.windows.win_shell: |
        $WarningPreference = 'SilentlyContinue'
        Import-Module Veeam.Backup.PowerShell -DisableNameChecking
        $jobs = Get-VBRJob
        $out = "<h3>🛡️ Status Veeam Islaz</h3><table border='1' style='border-collapse:collapse;font-family:Arial;'><tr><th>Job</th><th>Status</th><th>Data</th></tr>"
        foreach ($job in $jobs) {
            $s = $job.FindLastSession()
            $out += "<tr><td>$($job.Name)</td><td>$($s.Result)</td><td>$($s.EndTime)</td></tr>"
        }
        $out += "</table>"
        Write-Output $out
      args:
        executable: pwsh.exe
      register: v_out

    - name: Salvare Local Mac
      delegate_to: localhost
      copy:
        content: "{{ v_out.stdout }}"
        dest: "/tmp/veeam_raport.txt"
